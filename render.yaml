# Render.com blueprint — one free web service. Push this repo to GitHub, then
# in Render: New + > Blueprint > pick the repo. (Railway/Fly/HF Spaces work too;
# see README "Deploy to web".)
services:
  - type: web
    name: vistas-passive
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.10"
